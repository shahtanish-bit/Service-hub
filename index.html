<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Service-Hub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="images/favicon.jpg" type="image.jpg">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="logo">
                <img src="images/mee.png" alt="">
                <h1>Service-Hub</h1>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="">Explore</a></li>
                    <li><a href="">Near Me</a></li>
                    <li><a href="">My Bookings</a></li>
                    <li><a href="">Cart</a></li>
                    <li><a href="">Account</a></li>
                    <li><a href="">Coustomer Service</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-badge">
                Serving in Lahan & nearby areas
            </div>

            <h1>
                Book Skilled Helper
                <span>Near you</span>, <br>
                instantly
            </h1>

            <p>
                Find trusted plumbers, electricians, carpenters and more. Browse real profiles, check reviews, and book in minutes.
            </p>

            <div class="search-bar">
                <input type="text" placeholder="What service do you need?">
                <button class="search-btn">Search</button>
            </div>
        </section>
    </main>
</body>
</html>
